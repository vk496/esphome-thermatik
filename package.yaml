substitutions:
  # Expected user input
  mac_address: "" # fail by default
  pincode: 000000
  fetch_interval: 7s

  # Internal
  MAIN_SERVICE: "0000fff0-0000-1000-8000-00805f9b34fb"
  ADDRESS_BUFFER: "0000fff1-0000-1000-8000-00805f9b34fb"
  DATA_BUFFER: "0000fff2-0000-1000-8000-00805f9b34fb"

esphome:
  includes:
    - ble_values.h

# Enable logging
logger:
  # level: VERY_VERBOSE
  logs:
    esp32_ble_tracker: INFO

esp32_ble:
  io_capability: keyboard_display

ble_client:
  - mac_address: ${mac_address}
    id: my_ble_device
    auto_connect: true
    on_connect:
      then:
        - lambda: |-
            ESP_LOGD("ble_client_lambda", "Connected to BLE device");
            id(my_ble_device)->pair();
            id(connected)=true;
    on_passkey_request:
      then:
        - lambda: |-
            ESP_LOGD("ble_client_lambda", "PAIRING BLE passkey request");
        - ble_client.passkey_reply:
            id: my_ble_device
            passkey: ${pincode}
    on_disconnect:
      then:
        - lambda: |-
            ESP_LOGD("ble_client_lambda", "Disconnected from BLE device");
            id(connected)=false;

# Between writes and reads, we need to store which batch we actually waiting

globals:
  - id: last_ble_read
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: connected
    type: bool
    initial_value: "false"

  - id: current_address_buffer
    type: std::vector<uint8_t>

  - id: current_data_buffer
    type: std::vector<uint8_t>

  - id: current_index
    type: int
    initial_value: "0"

  - id: current_chunk
    type: std::vector<std::string>

  - id: dev_addr_is_good
    type: bool
    initial_value: "false"

  - id: current_batch
    type: std::vector<std::string>

  # Write to ADDR buffer, wait, read from VAL buffer
  - id: is_polling
    type: bool
    initial_value: "false"

  - id: is_writing_user
    type: bool
    initial_value: "false"

  - id: fallback_fill_5_elements
    type: std::vector<std::string>
    initial_value: |-
      {
        "vTcTemp1", 
        "cAmbientTemp",
        "_bDoorOpen",
        "FiringMode_0x1CBE", 
        "cAirSlider"
      }

  - id: pool_batches
    type: std::vector<std::string>
    initial_value: |-
      {
        "cAmbientTemp",
        "vTcTemp1", 
        "FiringMode_0x1CBE", 
        "cControllerStatus", 
        "cAirSlider",
        "cMotorError",
        "BoardTemp",
        "cAirSliderAutoManual",
        "_bDoorOpen",
        "cRefillStatus",
        "cSensorError",
      }

# Main trigger
interval:
  - interval: 3min
    startup_delay: 5min
    then:
      - lambda: |-
          uint32_t now = millis() / 1000;
          uint32_t last = id(last_ble_read);

          // Handle millis() rollover automatically using subtraction
          uint32_t diff = now - last;

          if (last == 0 || diff > 300) {  // 300s = 5 minutes
            ESP_LOGE("ble_watchdog", "BLE freeze detected, rebooting...");
            id(restart_button).press();
          } else {
            ESP_LOGD("ble_watchdog", "BLE watchdog OK (diff=%u s)", diff);
          }

  - interval: ${fetch_interval}
    startup_delay: 30s
    then:
      - script.execute: process_batches

cover:
  - platform: template
    id: sezam
    name: "Sezam"
    disabled_by_default: true
    device_class: garage
    optimistic: false
    open_action:
      - lambda: |-
          ESP_LOGD("ble", "Triggered Open Door");
          id(write_user_input)->execute(get_hex_bytes("cSezam"),{0x01, 0x00});
          id(sezam).current_operation=COVER_OPERATION_OPENING;
          id(sezam).publish_state();
    close_action:
      - lambda: |-
          ESP_LOGD("ble", "Triggered Close Door");
          id(write_user_input)->execute(get_hex_bytes("cSezam"),{0x01, 0x00}); // 0x01? Maybe 0x00?
          id(sezam).current_operation=COVER_OPERATION_CLOSING;
          id(sezam).publish_state();

button:
  - platform: template
    name: "Reboot BLE"
    device_class: restart # makes it behave like the restart button
    on_press:
      - lambda: id(my_ble_device).set_auto_connect(false); // disable auto connect
      - ble_client.disconnect: my_ble_device
      - delay: 10s
      - button.press: restart_button

  - platform: restart
    internal: True
    id: restart_button
    name: "Restart ESP"

  - platform: template
    name: "Door Remote"
    icon: "mdi:fireplace-off"
    disabled_by_default: true
    on_press:
      - lambda: |-
          ESP_LOGD("ble", "Triggered Door");
          id(write_user_input)->execute(get_hex_bytes("cSezam"),{0x01, 0x00});

script:
  - id: write_ble_to_address
    then:
      - ble_client.ble_write:
          id: my_ble_device
          service_uuid: ${MAIN_SERVICE}
          characteristic_uuid: ${ADDRESS_BUFFER}
          value: !lambda |-
            std::string hex;
            for (auto b : id(current_address_buffer)) {
              char buf[10];
              sprintf(buf, "%02X ", b);
              hex += buf;
            }
            ESP_LOGD("ble", "Written ADDRESS (%d bytes): %s", id(current_address_buffer).size(), hex.c_str());

            return id(current_address_buffer);

  - id: write_ble_to_data
    then:
      - ble_client.ble_write:
          id: my_ble_device
          service_uuid: ${MAIN_SERVICE}
          characteristic_uuid: ${DATA_BUFFER}
          value: !lambda |-
            std::string hex;
            for (auto b : id(current_data_buffer)) {
              char buf[10];
              sprintf(buf, "%02X ", b);
              hex += buf;
            }
            ESP_LOGD("ble", "Written DATA (%d bytes): %s", id(current_data_buffer).size(), hex.c_str());

            return id(current_data_buffer);

  - id: process_batches
    then:
      - lambda: |-
          id(current_index) = 0;

      - while:
          condition:
            lambda: "return id(current_index) < id(pool_batches).size();"
          then:
            - wait_until:
                condition:
                  lambda: "return ! id(is_writing_user);"

            - lambda: |-
                const int chunk_size = 5;
                int i = id(current_index);

                // Compute the end index safely
                int end = std::min(i + chunk_size, (int) id(pool_batches).size());

                // Create a chunk vector
                std::vector<std::string> chunk(id(pool_batches).begin() + i, id(pool_batches).begin() + end);

                id(current_chunk) = chunk;

            - script.execute: read_batch_values
            - script.wait: read_batch_values

            - lambda: |-
                id(current_index) += 5; //chunk_size

  - id: write_dev_addr
    parameters:
      x: string
    then:
      - lambda: |-
          std::vector<uint8_t> addr = get_hex_bytes(x);

          // PERFORM WRITE ACTION



          if (addr == std::vector<uint8_t>{0x00, 0x00}) {
            id(dev_addr_is_good) = false;
          } else {
            id(dev_addr_is_good) = true;
          }

      - if:
          condition:
            lambda: "return ! id(dev_addr_is_good);"
          then:
            - logger.log: "Bad address value"
            - script.stop: write_dev_addr

      - globals.set:
          id: is_writing_user
          value: "true"

      - wait_until:
          condition:
            lambda: "return id(connected) && ! id(is_polling);"
          timeout: 25s # Deadlock safety
      - if:
          condition:
            lambda: "return !id(connected) || id(is_polling);"
          then:
            - logger.log: "Timed out waiting for dev writting"
            - script.stop: write_dev_addr

      - lambda: |-
          id(current_address_buffer) = get_hex_bytes(x);

          // Empty vector
          id(current_batch).clear();

          id(current_batch).insert(id(current_batch).end(), x);

      - script.execute: write_ble_to_address
      - script.wait: write_ble_to_address

      - delay: 2s

      - globals.set:
          id: is_polling
          value: "true"

      - component.update: read_ble_characteristic # No user write request.

      - wait_until:
          condition:
            lambda: "return ! id(is_polling);"
          timeout: 25s # Deadlock safety

      - globals.set:
          id: is_writing_user
          value: "false"

  # FIXME: Currently, only 1 of 5 buffer slots is used for user input.
  # In the future, a script execution should stack them as batch of 5 operations
  - id: write_user_input
    mode: queued
    max_runs: 5
    parameters:
      address: std::vector<uint8_t>
      data: std::vector<uint8_t>
    then:
      # Indicates a user input is in queue
      - globals.set:
          id: is_writing_user
          value: "true"
      # Waits to finish any current polling
      - wait_until:
          condition:
            lambda: "return id(connected) && ! id(is_polling);"
          timeout: 25s # Deadlock safety
      - lambda: |-
          if (!id(connected) || id(is_polling)) {
            ESP_LOGE("ble", "Timed out waiting for writting %d %d", id(connected), id(is_writing_user));
            id(write_user_input).stop();
            return;
          }

      - lambda: |-
          std::vector<uint8_t> tx_buffer = address;
          std::string hex;
          for (auto b : tx_buffer) {
            char buf[10];
            sprintf(buf, "%02X ", b);
            hex += buf;
          }

          id(current_address_buffer) = address;

      - script.execute: write_ble_to_address
      - script.wait: write_ble_to_address

      - delay: 1s

      - lambda: |-
          id(current_data_buffer) = data;

      - script.execute: write_ble_to_data
      - script.wait: write_ble_to_data
      - delay: 400ms

      # - globals.set: # we cancel the poll results, as the write command will interfere
      #     id: is_polling
      #     value: "false"

      # - delay: 2s # On my tests, values are not populated if you read too fast. 2s was the minimum reliable

      # Translate data to actual user input and trigger sensors
      # - component.update: read_ble_characteristic

      # - wait_until:
      #     condition:
      #       lambda: "return ! id(is_writing_user);"
      #     timeout: 15s
      - lambda: |-
          ESP_LOGD("ble", "Writing command is done");
      - globals.set:
          id: is_writing_user
          value: "false"

  - id: read_batch_values
    then:
      - wait_until:
          condition:
            lambda: "return id(connected) && ! id(is_writing_user);"
          timeout: 25s
      - lambda: |-
          if (!id(connected) || id(is_writing_user)) {
            ESP_LOGE("main", "Timed out for read batch %d %d", id(connected), id(is_writing_user));
            id(read_batch_values).stop();
            return;
          }
      - logger.log: "DEBUG: Start polling"
      - globals.set:
          id: is_polling
          value: "true"
      - logger.log: "DEBUG: Prepare payload"
      - lambda: |-
          // Ensure we never process more than 5 keys
          if (id(current_chunk).size() > 5) {
            ESP_LOGW("main", "Resizing chunk because it was %d length", id(current_chunk).size());
            id(current_chunk).resize(5);
          }


          // Empty vector
          id(current_batch).clear();


          std::vector<uint8_t> payload;
          payload.reserve(5 * 2);  // 5 elements * 2 bytes each

          // 1. Add provided keys
          for (const auto &k : id(current_chunk)) {
              auto bytes = get_hex_bytes(k);   // must return exactly 2 bytes
              payload.insert(payload.end(), bytes.begin(), bytes.end());
              id(current_batch).insert(id(current_batch).end(), k);
              
          }

          // 2. Pad with default keys if needed
          for (size_t i = id(current_chunk).size(); i < 5; i++) {
              auto bytes = get_hex_bytes(id(fallback_fill_5_elements)[i]);
              payload.insert(payload.end(), bytes.begin(), bytes.end());
              id(current_batch).insert(id(current_batch).end(), id(fallback_fill_5_elements)[i]);
          }


          std::string joined;
          for (const auto &s : id(current_batch)) {
              joined += s + ", ";
          }
          ESP_LOGI("main", "Processing chunk: [%s]", joined.c_str());


          // 3. Save to buffer
          id(current_address_buffer) = payload;

      - logger.log: "DEBUG: Run BLE ADDR write"

      - script.execute: write_ble_to_address
      - script.wait: write_ble_to_address

      - logger.log: "DEBUG: Wait BLE ADDR write"

      - wait_until:
          condition:
            lambda: "return id(is_writing_user);"
          # NOTE: # On my tests, values are not populated if you read too fast. 2s was the minimum reliable
          timeout: 2s # Device take time to process. Wait meanwhile

      - if:
          condition:
            lambda: "return id(is_writing_user);"
          then:
            - logger.log: "User requested write data. Cancelling poll"
            - globals.set:
                id: is_polling
                value: "false"
          else:
            - logger.log: "DEBUG: Read BLE char"
            - component.update: read_ble_characteristic # No user write request.

      - wait_until:
          condition:
            lambda: "return ! id(is_polling);"
          timeout: 25s # Deadlock safety

        # Finish anyway in case of timeout
      - lambda: |-
          if (id(is_polling)) {
            ESP_LOGE("main", "poll not done in 25s");
            id(is_polling) = false;
          }

text:
  - platform: template
    mode: text
    name: "Dev Sensor Key"
    id: dev_sensor_key
    disabled_by_default: true
    optimistic: true
    on_value:
      then:
        - lambda: |-
            id(write_dev_addr)->execute(x);

text_sensor:
  - platform: template
    id: cControllerStatusText
    icon: "mdi:fireplace"
    name: "Status"

  - platform: template
    id: cMotorErrorText
    icon: "mdi:engine"
    name: "Motor Status"

  - platform: template
    name: "Dev Sensor Value"
    id: dev_sensor_value
    disabled_by_default: true

select:
  - platform: template
    id: cPowerIcon
    name: "Heating"
    icon: "mdi:fire"
    options:
      - "Low"
      - "Mid"
      - "High"
    optimistic: true
    set_action:
      - lambda: |-
          ESP_LOGD("ble", "Triggered set powerIcon action");
          auto index = id(cPowerIcon).index_of(x);
          if (index.has_value()) {
            int raw_value = index.value();

            // Increase by 1, since server accepts only 1, 2 and 3 as input
            raw_value = raw_value + 1;

            id(write_user_input)->execute(get_hex_bytes("FiringMode_0x1CBE"),{(uint8_t)raw_value, 0x00});
          } else {
            ESP_LOGE("main", "Undefined state. WTF?");
          }

switch:
  - platform: template
    id: cAirSliderAutoManual
    optimistic: true
    name: "Air Slider Manual mode"
    on_turn_on:
      - lambda: |-
          if (id(connected)) {
            ESP_LOGD("ble", "Turned manual slider ON");
            id(write_user_input)->execute(get_hex_bytes("cAirSliderAutoManual"),{0x01, 0x00});
          }
    on_turn_off:
      - lambda: |-
          if (id(connected)) { // when the entity is initialized, this function is triggered
            ESP_LOGD("ble", "Turned manual slider OFF");
            id(write_user_input)->execute(get_hex_bytes("cAirSliderAutoManual"),{0x00, 0x00});
          }

# TODO: Implement a read operation
number:
  - platform: template
    id: cAirSliderPercentage
    name: "Air Slider value"
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"
    icon: "mdi:fan-alert"
    set_action:
      then:
        - lambda: |-
            ESP_LOGD("ble", "Triggered airslider action");
            if (id(cAirSliderAutoManual).state) {
              id(write_user_input)->execute(get_hex_bytes("cAirSlider"),{(uint8_t)x, 0x00});

              //Assume it will actually change it
              id(cAirSliderPercentage).publish_state(x);
            } else {
              ESP_LOGW("main", "Manual mode not enabled");

              // Restore to previous
              id(cAirSliderPercentage).publish_state(id(cAirSlider).state);
            }

binary_sensor:
  - platform: template
    id: _bDoorOpen
    device_class: door
    name: "Door"
  - platform: template
    id: cRefillStatus
    icon: "mdi:login-variant"
    name: "Refill"

sensor:
  - platform: template
    id: cAmbientTemp
    name: "Ambient temperature"
    icon: "mdi:thermometer"
    device_class: "temperature"
    state_class: "measurement"
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    filters:
      - round: 0
      - skip_initial: 2

  - platform: template
    id: BoardTemp
    name: "Board temperature"
    icon: "mdi:thermometer"
    device_class: "temperature"
    state_class: "measurement"
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    filters:
      - round: 0
      - skip_initial: 2

  - platform: template
    id: vTcTemp1
    name: "Exhaust temperature"
    icon: "mdi:fire"
    device_class: "temperature"
    state_class: "measurement"
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    filters:
      - round: 0
      - skip_initial: 2

  - platform: template
    id: cAirSlider
    name: "Air slider"
    icon: "mdi:fan"
    state_class: "measurement"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    filters:
      - round: 0
      - skip_initial: 2

  - platform: template
    id: cControllerStatus
    name: "Status Code"
    disabled_by_default: true
    accuracy_decimals: 0
    filters:
      - round: 0
      - skip_initial: 2

  - platform: template
    id: cMotorError
    disabled_by_default: true
    name: "Motor Status Code"
    icon: "mdi:engine"
    accuracy_decimals: 0
    filters:
      - round: 0
      - skip_initial: 2

  - platform: template
    id: cSensorError
    disabled_by_default: true
    name: "Sensor Error Count"
    accuracy_decimals: 0

  - platform: ble_client
    type: characteristic
    ble_client_id: my_ble_device
    id: read_ble_characteristic
    internal: true
    name: "RX stream"
    service_uuid: ${MAIN_SERVICE}
    characteristic_uuid: ${DATA_BUFFER}
    update_interval: never
    lambda: |-
      std::string hex;
      for (auto b : x) {
        char buf[10];
        sprintf(buf, "%02X ", b);
        hex += buf;
      }
      ESP_LOGD("ble", "RX data(%d bytes): %s", x.size(), hex.c_str());



      // NOTE: This is a ble_client to read a characteristic, the data comes from x
      // NOTE2: This callback is used to populate dev inputs too, so we cant break execution based on is_writing_user


      for (size_t i = 0; i < id(current_batch).size(); i++) {

        std::string target_batch = id(current_batch)[i];

        int value_left = x[i*2];
        int value_right = x[i*2+1];
        int value_le = (x[i*2+1] << 8) | x[i*2];
        int value_be = (x[i*2] << 8) | x[i*2+1];



        if ("cAmbientTemp" == target_batch ) {
          id(cAmbientTemp).publish_state(value_le);

        } else if ("vTcTemp1" == target_batch) {
          id(vTcTemp1).publish_state(value_le);

        } else if ("FiringMode_0x1CBE" == target_batch) {
          id(cPowerIcon).publish_state(value_le - 1); // Values are 1, 2 and 3. Start with 0 so we can work with index

        } else if ("cControllerStatus" == target_batch) {
          id(cControllerStatus).publish_state(value_le);

          static const char* STATUS_TEXT[] = {
            "Standby",        // 0
            "Ignition",       // 1
            "Rising",         // 2
            "Falling",        // 3
            "Refill",         // 4
            "Glowing",        // 5
            "No ignition",    // 6
            "Overheated",     // 7
            "Reducing glow",  // 8
            "Chamber flush"   // 9
          };

          const int max_index = sizeof(STATUS_TEXT) / sizeof(STATUS_TEXT[0]);
          const std::string val_text =
              (value_left >= 0 && value_left < max_index) ? STATUS_TEXT[value_left] : "Unknown";

          id(cControllerStatusText).publish_state(val_text);

        } else if ("cAirSlider" == target_batch) {
          id(cAirSlider).publish_state(value_le);
          id(cAirSliderPercentage).publish_state(value_le);

        } else if ("BoardTemp" == target_batch) {
          id(BoardTemp).publish_state(value_le);

        } else if ("_bDoorOpen" == target_batch) {
          id(_bDoorOpen).publish_state(value_le == 1); // bool. 0 closed, 1 open
          if (value_le == 1 && id(sezam).position != COVER_OPEN) {
              id(sezam).current_operation=COVER_OPERATION_IDLE;
              id(sezam).position=COVER_OPEN;
              id(sezam).publish_state();
          } else if ( value_le == 0 && id(sezam).position != COVER_CLOSED) {
              id(sezam).current_operation=COVER_OPERATION_IDLE;
              id(sezam).position=COVER_CLOSED;
              id(sezam).publish_state();
          }

        } else if ("cRefillStatus" == target_batch) {
          id(cRefillStatus).publish_state(value_le == 1); // bool. 0 closed, 1 open

        } else if ("cSensorError" == target_batch) {
          id(cSensorError).publish_state(value_le);

        } else if ("cAirSliderAutoManual" == target_batch) {
          id(cAirSliderAutoManual).publish_state(value_le == 1); // bool. 0 off, 1 on

        } else if ("cMotorError" == target_batch) {
          // FIXME: Check if they are actual the correct codes

          id(cMotorError).publish_state(value_le);
          std::string val_text = "Unknown";
          if (value_left == 0) {
            val_text = "OK";
          } else if (value_left == 16) { // wild guess
            val_text = "Motor blocked";
          } else if (value_left == 20) {
            val_text = "Motor circuit open";
          } else if (value_left == 64) {
            val_text = "Air slider failure"; // wild guess
          } else if (value_left == 128) {
            val_text = "Air slider OK";
          }
          id(cMotorErrorText).publish_state(val_text);

        } else {
          ESP_LOGE("main", "Unknown case %s (value_le: %d)", target_batch.c_str(), value_le);
          id(dev_sensor_value).publish_state(std::to_string(value_le));
        }

      }

      id(is_polling) = false;

      id(last_ble_read) = millis() / 1000;  // seconds
      ESP_LOGD("ble_watchdog", "Updated last BLE read: %u", id(last_ble_read));

      return true;
